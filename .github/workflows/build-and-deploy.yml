name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build images and push to ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine ACR name
        run: |
          # Prefer secret ACR_NAME, fall back to shoppingacrdev
          if [ -n "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME=${{ secrets.ACR_NAME }}" >> $GITHUB_ENV
          else
            echo "ACR_NAME=shoppingacrdev" >> $GITHUB_ENV
          fi

      - name: Get ACR login server
        run: |
          ACR_NAME="$ACR_NAME"
          echo "Looking up ACR: $ACR_NAME"
          ACR_LOGIN=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN" >> $GITHUB_ENV

      - name: Login to ACR
        run: |
          echo "Logging into ACR $ACR_NAME"
          az acr login --name "$ACR_NAME"

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-frontend:${{ github.sha }}
