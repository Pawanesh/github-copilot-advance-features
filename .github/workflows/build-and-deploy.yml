name: Build and Deploy

on:
  workflow_dispatch:   # enables manual run
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build images and push to ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine ACR name
        run: |
          # Prefer secret ACR_NAME, fall back to shoppingacrdev
          if [ -n "${{ secrets.ACR_NAME }}" ]; then
            echo "ACR_NAME=${{ secrets.ACR_NAME }}" >> $GITHUB_ENV
          else
            echo "ACR_NAME=shoppingacrdev" >> $GITHUB_ENV
          fi

      - name: Print ACR_LOGIN_SERVER
        run: |
          echo "ACR_LOGIN_SERVER (workflow env): ${{ env.ACR_LOGIN_SERVER }}"
          echo "ACR_LOGIN_SERVER (shell): $ACR_LOGIN_SERVER"

      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-frontend:${{ github.sha }}
