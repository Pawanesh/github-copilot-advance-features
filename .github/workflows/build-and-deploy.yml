name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  terraform-init-apply:
    name: Terraform Init & Apply (create ACR + infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      - name: Terraform Apply (create infra)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve

  build-and-push:
    name: Build images and push to ACR
    runs-on: ubuntu-latest
    needs: terraform-init-apply
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine ACR name
        run: |
          echo "ACR_NAME=${{ secrets.ACR_NAME || 'shoppingacrdev' }}" >> $GITHUB_ENV

      - name: Get ACR login server
        run: |
          ACR_NAME=${{ env.ACR_NAME }}
          ACR_LOGIN=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN" >> $GITHUB_ENV

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/online-shopping-frontend:${{ github.sha }}

  terraform-deploy:
    name: Terraform deploy container apps (set images)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      - name: Terraform Apply (update images)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./infra/terraform
        run: |
          terraform apply -auto-approve \
            -var "backend_image=${{ env.ACR_LOGIN_SERVER }}/online-shopping-backend:${{ github.sha }}" \
            -var "frontend_image=${{ env.ACR_LOGIN_SERVER }}/online-shopping-frontend:${{ github.sha }}"
